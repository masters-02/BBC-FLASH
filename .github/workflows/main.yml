name: Global News Sinhala Bot

on:
  schedule:
    - cron: '0 * * * *' # සෑම පැයකටම වරක්
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # වැදගත්: මෙය Database එක update කිරීමට අවශ්‍යයි

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests googletrans==4.0.0-rc1

      - name: Run Bot
        env:
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py

      - name: Commit Database Update
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@news.com"
          git add sent_news.txt
          git commit -m "Update sent news list" || exit 0
          git push
