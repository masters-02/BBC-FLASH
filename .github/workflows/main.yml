name: Global 2-Hour News Bot

on:
  schedule:
    # සෑම පැය 2කට වරක් ක්‍රියාත්මක වේ (UTC 0, 2, 4, 6...)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Bot
        env:
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py

      - name: Save Sent News List
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@news.com"
          git add sent_news.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update DB [skip ci]" && git push)
