name: BBC News Sinhala Bot (NewsAPI Version)

on:
  schedule:
    # සෑම විනාඩි 30කට වරක් ස්වයංක්‍රීයව ක්‍රියාත්මක වේ
    - cron: '*/30 * * * *'
  workflow_dispatch: # ඔබට අවශ්‍ය ඕනෑම වෙලාවක "Run workflow" එබිය හැක

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests googletrans==4.0.0-rc1

      - name: Run Python Bot
        env:
          # GitHub Secrets හරහා ලබා දෙන අගයන්
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py
