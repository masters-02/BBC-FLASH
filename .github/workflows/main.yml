name: BBC Flash Auto News Editor & Uploader

on:
  schedule:
    - cron: '0 */2 * * *' # සෑම පැය 2කට වරක් ස්වයංක්‍රීයව ක්‍රියාත්මක වේ
  workflow_dispatch: # ඔබට අවශ්‍ය ඕනෑම වෙලාවක manual run කිරීමට

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: administrations/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run News Bot System
        env:
          # GitHub Secrets වල මේවා අනිවාර්යයෙන්ම add කර තිබිය යුතුය
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py

      - name: Save Sent News Database
        run: |
          git config --global user.name "BBC-Flash-Bot"
          git config --global user.email "bot@bbcflash.com"
          git add sent_news.txt
          # වෙනසක් ඇත්නම් පමණක් commit කර push කරයි
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent news list [skip ci]" && git push)
