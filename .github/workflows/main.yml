name: BBC Flash Auto News Editor & Uploader

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5  # මෙතන 'actions' කියලා තියෙන්න ඕනේ
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run News Bot System
        env:
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py

      - name: Save Sent News Database
        run: |
          git config --global user.name "BBC-Flash-Bot"
          git config --global user.email "bot@bbcflash.com"
          git add sent_news.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news database [skip ci]" && git push)
