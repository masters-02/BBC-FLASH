name: BBC News Sinhala Bot

on:
  schedule:
    # සෑම විනාඩි 30කට වරක් ක්‍රියාත්මක වේ (UTC Time)
    - cron: '*/30 * * * *'
  workflow_dispatch: # අවශ්‍ය විටක manual run කිරීමට

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests googletrans==4.0.0-rc1

      - name: Execute Python script
        env:
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL: ${{ secrets.WHATSAPP_CHANNEL }}
        run: python bot.py
